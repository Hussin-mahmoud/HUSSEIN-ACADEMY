<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية التعليم العالي | HUSSEIN ACADEMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --primary: #2563eb; --border: #e5e7eb; --dark: #1f2937; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #f3f4f6; color: var(--dark); margin: 0; }
        .student-layout { display: grid; grid-template-columns: 350px 1fr; gap: 20px; padding: 20px; max-width: 1400px; margin: auto; }
        
        /* تحسين القائمة الجانبية */
        .sidebar-playlist { background: white; border-radius: 12px; padding: 15px; height: 80vh; overflow-y: auto; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .v-item { padding: 12px; margin-bottom: 8px; background: #f9fafb; border-radius: 8px; cursor: pointer; transition: 0.3s; border: 1px solid #eee; }
        .v-item:hover, .v-item.active { background: var(--primary); color: white; }
        
        /* تحسين المشغل */
        .screen-frame { background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16/9; position: relative; }
        .html5-video { width: 100%; height: 100%; }
        
        /* تحسينات عامة */
        .loading-spinner { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: white; display: none; }
    </style>
</head>
<body>

    <!-- Curtain Lock & Header (Keep as is in your version) -->
    <div id="lockCurtain" class="lock-curtain">...</div>

    <div class="student-layout">
        <aside class="sidebar-playlist">
            <select id="courseDropdown" onchange="loadVideosOfSelectedCourse()"></select>
            <ul class="v-list" id="videosListView" style="padding:0; list-style:none; margin-top:20px;"></ul>
        </aside>
        
        <main class="player-panel">
            <h2 id="videoDisplayTitle">اختر الدرس</h2>
            <div class="screen-frame" id="playerContainer">
                <div id="loader" class="loading-spinner"><i class="fa fa-spinner fa-spin fa-3x"></i></div>
            </div>
            <div class="download-box" id="attachmentsBox"></div>
        </main>
    </div>

    <script>
        let hlsInstance = null;

        // دالة تشغيل الفيديو مع حفظ مكان التوقف (Resume feature)
        window.triggerStream = function(videoJson, element) {
            const v = typeof videoJson === 'string' ? JSON.parse(videoJson.replace(/&quot;/g, '"')) : videoJson;
            
            // تحديث العناصر النشطة
            document.querySelectorAll('.v-item').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');
            
            document.getElementById('videoDisplayTitle').innerText = v.title;
            const container = document.getElementById('playerContainer');
            const loader = document.getElementById('loader');
            
            loader.style.display = 'block';
            if (hlsInstance) hlsInstance.destroy();

            // منطق تشغيل ذكي
            if (v.src.includes('.m3u8')) {
                container.innerHTML = `<video id="hlsPlayer" class="html5-video" controls autoplay></video>`;
                const video = document.getElementById('hlsPlayer');
                hlsInstance = new Hls();
                hlsInstance.loadSource(v.src);
                hlsInstance.attachMedia(video);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    loader.style.display = 'none';
                    // استعادة وقت المشاهدة السابق إذا وجد
                    video.currentTime = localStorage.getItem(`time_${v.title}`) || 0;
                });
                // حفظ التوقيت دورياً
                video.addEventListener('timeupdate', () => {
                    localStorage.setItem(`time_${v.title}`, video.currentTime);
                });
            } else {
                container.innerHTML = `<video class="html5-video" controls src="${v.src}"></video>`;
                loader.style.display = 'none';
            }
        };

        // تحسين تحميل القائمة لتكون أكثر سرعة
        function loadVideosOfSelectedCourse() {
            const selectedCourse = document.getElementById('courseDropdown').value;
            const allVideos = JSON.parse(localStorage.getItem('academy_playlist_videos')) || [];
            const filtered = allVideos.filter(v => v.course === selectedCourse);
            const list = document.getElementById('videosListView');
            
            list.innerHTML = filtered.map((v, i) => `
                <li class="v-item" onclick="triggerStream('${JSON.stringify(v).replace(/"/g, '&quot;')}', this)">
                    <i class="fa fa-play-circle"></i> ${v.title}
                </li>
            `).join('');
        }
    </script>
</body>
</html>
