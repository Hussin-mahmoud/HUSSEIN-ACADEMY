<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أكاديمية التعليم العالي | HUSSEIN ACADEMY</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background-color: #f3f4f6; color: #1f2937; }
        .student-layout { max-width: 1400px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 340px 1fr; gap: 25px; }
        
        .playlist-selector-box { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: var(--shadow-sm); }
        .playlist-selector-box select { width: 100%; padding: 12px; border: 2px solid var(--primary); border-radius: 8px; outline: none; font-size: 14px; font-weight: 700; color: var(--dark-bg); background: #f8fafc; cursor: pointer; }
        
        .sidebar-playlist { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: var(--shadow-sm); height: fit-content; }
        .v-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }
        .v-item { padding: 14px 16px; background: #f8fafc; border-radius: 8px; cursor: pointer; font-size: 13.5px; font-weight: 600; transition: var(--transition); display: flex; align-items: center; gap: 10px; border: 1px solid transparent; color: #374151; }
        .v-item:hover { background: #f1f5f9; color: var(--primary); }
        .v-item.active { background: #eff6ff; color: var(--primary); border-color: rgba(37,99,235,0.2); font-weight: 700; }

        .player-panel { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 25px; box-shadow: var(--shadow-sm); }
        .screen-frame { background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16 / 9; box-shadow: var(--shadow-md); position: relative; }
        .html5-video { width: 100%; height: 100%; display: block; }
        
        .download-box { margin-top: 25px; padding-top: 20px; border-top: 1px solid #e5e7eb; }
        .dl-btn { background: #f1f5f9; color: #1f2937; border: 1px solid var(--border); padding: 12px 18px; border-radius: 8px; font-weight: 700; font-size: 13px; text-decoration: none; inline-flex: center; gap: 8px; display: inline-flex; transition: var(--transition); margin-left: 10px; }
        .dl-btn:hover { background: #1f2937; color: white; }

        .lock-curtain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999999; text-align: center; padding: 20px; display: none; }
    </style>
</head>
<body>

    <div id="lockCurtain" class="lock-curtain">
        <i class="fa-solid fa-hourglass-lock" style="font-size: 70px; color: #ef4444; margin-bottom: 20px;"></i>
        <h2 id="lockTitle" style="font-weight:800; font-size:24px; margin-bottom:10px;">عذراً، اشتراكك انتهى أو تم حظره!</h2>
        <p style="color:#6b7280; font-size:15px; margin-bottom:25px;">يرجى مراجعة وتجديد الحساب مع الإدارة لمتابعة باقي الفيديوهات والملحقات.</p>
        <a href="https://wa.me/201090144852" target="_blank" class="btn btn-primary" style="text-decoration:none; padding:12px 30px;"><i class="fa-brands fa-whatsapp"></i> تجديد الاشتراك فوراً</a>
    </div>

    <header class="main-header" style="background: white; border-bottom: 1px solid var(--border);">
        <a href="index.html" class="brand-logo" style="color:var(--dark-bg);">HUSSEIN <span style="color:var(--primary)">ACADEMY</span></a>
        <div id="welcomeUser" style="font-weight:700; color:#1f2937;">جاري المزامنة المشددة...</div>
        <div class="header-actions">
            <span id="daysCounter" style="background:#eff6ff; padding:8px 16px; border-radius:20px; font-size:12px; font-weight:700; color:var(--primary); margin-left:15px;"></span>
            <button onclick="exit()" class="btn btn-primary" style="background:#ef4444; border-color:#ef4444; padding:8px 16px; font-size:13px;">تسجيل خروج</button>
        </div>
    </header>

    <div class="student-layout">
        <div>
            <div class="playlist-selector-box">
                <label style="font-size:12px; font-weight:700; color:#4b5563; display:block; margin-bottom:6px;"><i class="fa-solid fa-photo-film"></i> اختر كورس العرض الحركي:</label>
                <select id="courseDropdown" onchange="loadVideosOfSelectedCourse()"></select>
            </div>
            <aside class="sidebar-playlist">
                <h4 style="margin-top:0; margin-bottom:15px; font-size:14px; color:#1e293b;"><i class="fa-solid fa-list-ol"></i> أجزاء الكورس الحالي:</h4>
                <ul class="v-list" id="videosListView"></ul>
            </aside>
        </div>

        <main class="player-panel">
            <h2 id="videoDisplayTitle" style="font-size:1.4rem; font-weight:700; margin-top:0; margin-bottom:20px;">اختر الدرس لبدء المشاهدة</h2>
            <div class="screen-frame" id="playerContainer">
                <video id="hlsPlayer" class="html5-video" controls controlsList="nodownload" oncontextmenu="return false;"></video>
            </div>
            <div class="download-box">
                <h4 style="font-size:14px; margin-top:0; margin-bottom:12px; color:#1e293b;"><i class="fa-solid fa-paperclip"></i> روابط تحميل ملحقات الدرس المباشرة:</h4>
                <div id="attachmentsBox"></div>
            </div>
        </main>
    </div>

    <script>
        let hlsInstance = null;
        const playerContainer = document.getElementById('playerContainer');

        function enforceSecurity() {
            const current = JSON.parse(localStorage.getItem('current_user'));
            const all = JSON.parse(localStorage.getItem('academy_users')) || [];
            const fresh = all.find(u => u.email === current?.email);
            if (!current || !fresh) { window.location.href = 'login.html'; return; }
            if (fresh.status !== 'active' || !fresh.expiryDate) {
                document.getElementById('lockCurtain').style.display = 'flex';
                return;
            }
            const diff = new Date(fresh.expiryDate) - new Date();
            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
            if (days <= 0) {
                document.getElementById('lockCurtain').style.display = 'flex';
            } else {
                document.getElementById('lockCurtain').style.display = 'none';
                document.getElementById('welcomeUser').innerText = `بوابة الطالب: ${fresh.name}`;
                document.getElementById('daysCounter').innerHTML = `<i class="fa-solid fa-hourglass-half"></i> متبقي لك: ${days} يوم إتاحة`;
            }
        }

        window.addEventListener('storage', function(e) { enforceSecurity(); loadCoursesDropdown(); });

        function loadCoursesDropdown() {
            const courses = JSON.parse(localStorage.getItem('academy_playlists')) || [];
            const dropdown = document.getElementById('courseDropdown');
            const previousValue = dropdown.value;
            dropdown.innerHTML = '';
            if(courses.length === 0) { dropdown.innerHTML = '<option value="">-- لا يوجد كورسات مرفوعة --</option>'; return; }
            courses.forEach(c => { dropdown.innerHTML += `<option value="${c}">${c}</option>`; });
            if(previousValue && courses.includes(previousValue)) dropdown.value = previousValue;
            loadVideosOfSelectedCourse();
        }

        function loadVideosOfSelectedCourse() {
            const selectedCourse = document.getElementById('courseDropdown').value;
            const allVideos = JSON.parse(localStorage.getItem('academy_playlist_videos')) || [];
            const filteredVideos = allVideos.filter(v => v.course === selectedCourse);
            const listContainer = document.getElementById('videosListView');
            listContainer.innerHTML = '';
            if (filteredVideos.length === 0) { listContainer.innerHTML = '<li style="font-size:12px; color:#6b7280; padding:10px;">لا توجد دروس مضافة لهذا الكورس بعد.</li>'; return; }
            filteredVideos.forEach((v, index) => {
                const videoData = JSON.stringify(v).replace(/"/g, '&quot;');
                listContainer.innerHTML += `<li class="v-item ${index === 0 ? 'active' : ''}" onclick="triggerStream('${videoData}', this)"><i class="fa-solid fa-circle-play"></i> ${v.title}</li>`;
            });
            if(filteredVideos.length > 0) triggerStream(JSON.stringify(filteredVideos[0]), document.querySelector('.v-item'));
        }

        window.triggerStream = function(videoJson, element) {
            const videoObj = typeof videoJson === 'string' ? JSON.parse(videoJson.replace(/&quot;/g, '"')) : videoJson;
            if(!videoObj) return;
            document.querySelectorAll('.v-item').forEach(li => li.classList.remove('active'));
            if(element) element.classList.add('active');
            document.getElementById('videoDisplayTitle').innerText = videoObj.title;
            const box = document.getElementById('attachmentsBox');
            box.innerHTML = (videoObj.res && videoObj.link) ? `<a href="${videoObj.link}" target="_blank" class="dl-btn"><i class="fa-solid fa-download"></i> ${videoObj.res}</a>` : '<span style="color:#6b7280; font-size:13px;">لا توجد ملفات مرفقة للتحميل.</span>';

            if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

            if (videoObj.src.includes('youtube.com') || videoObj.src.includes('youtu.be')) {
                let videoId = videoObj.src.includes('v=') ? videoObj.src.split('v=')[1].split('&')[0] : videoObj.src.split('/').pop().split('?')[0];
                playerContainer.innerHTML = `<iframe class="html5-video" src="https://www.youtube.com/embed/${videoId}?autoplay=1&rel=0&modestbranding=1" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen referrerpolicy="strict-origin-when-cross-origin"></iframe>`;
            } else if (videoObj.src.includes('.m3u8') && Hls.isSupported()) {
                playerContainer.innerHTML = `<video id="hlsPlayer" class="html5-video" controls controlsList="nodownload"></video>`;
                const player = document.getElementById('hlsPlayer');
                hlsInstance = new Hls();
                hlsInstance.loadSource(videoObj.src);
                hlsInstance.attachMedia(player);
                player.play();
            } else {
                playerContainer.innerHTML = `<video id="hlsPlayer" class="html5-video" controls controlsList="nodownload" src="${videoObj.src}"></video>`;
                document.getElementById('hlsPlayer').play();
            }
        }

        function exit() { localStorage.removeItem('current_user'); window.location.href = 'login.html'; }

        enforceSecurity();
        loadCoursesDropdown();
        document.addEventListener('contextmenu', e => e.preventDefault());
    </script>
</body>
</html>
