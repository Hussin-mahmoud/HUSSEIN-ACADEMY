<!DOCTYPE html>

<html lang="ar" dir="rtl">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>أكاديمية التعليم العالي | HUSSEIN ACADEMY</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>

        body { background-color: #f3f4f6; color: #1f2937; }

        .student-layout { max-width: 1400px; margin: 30px auto; padding: 0 20px; display: grid; grid-template-columns: 340px 1fr; gap: 25px; }

        .playlist-selector-box { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: var(--shadow-sm); }

        .playlist-selector-box select { width: 100%; padding: 12px; border: 2px solid var(--primary); border-radius: 8px; outline: none; font-size: 14px; font-weight: 700; color: var(--dark-bg); background: #f8fafc; cursor: pointer; }

        .sidebar-playlist { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 20px; box-shadow: var(--shadow-sm); height: fit-content; }

        .v-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 8px; }

        .v-item { padding: 14px 16px; background: #f8fafc; border-radius: 8px; cursor: pointer; font-size: 13.5px; font-weight: 600; transition: var(--transition); display: flex; align-items: center; gap: 10px; border: 1px solid transparent; color: #374151; }

        .v-item:hover { background: #f1f5f9; color: var(--primary); }

        .v-item.active { background: #eff6ff; color: var(--primary); border-color: rgba(37,99,235,0.2); font-weight: 700; }

        .player-panel { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 25px; box-shadow: var(--shadow-sm); }

        .screen-frame { background: #000; border-radius: 12px; overflow: hidden; aspect-ratio: 16 / 9; box-shadow: var(--shadow-md); position: relative; }

        .html5-video { width: 100%; height: 100%; display: block; }

        .download-box { margin-top: 25px; padding-top: 20px; border-top: 1px solid #e5e7eb; }

        .dl-btn { background: #f1f5f9; color: #1f2937; border: 1px solid var(--border); padding: 12px 18px; border-radius: 8px; font-weight: 700; font-size: 13px; text-decoration: none; inline-flex: center; gap: 8px; display: inline-flex; transition: var(--transition); margin-left: 10px; }

        .dl-btn:hover { background: #1f2937; color: white; }

        .lock-curtain { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999999; text-align: center; padding: 20px; display: none; }

    </style>

</head>

<body>



    <div id="lockCurtain" class="lock-curtain">

        <i class="fa-solid fa-hourglass-lock" style="font-size: 70px; color: #ef4444; margin-bottom: 20px;"></i>

        <h2 id="lockTitle" style="font-weight:800; font-size:24px; margin-bottom:10px;">عذراً، اشتراكك انتهى أو تم حظره!</h2>

        <a href="https://wa.me/201090144852" target="_blank" class="btn btn-primary" style="text-decoration:none; padding:12px 30px;"><i class="fa-brands fa-whatsapp"></i> تواصل مع الإدارة</a>

    </div>



    <header class="main-header" style="background: white; border-bottom: 1px solid var(--border);">

        <a href="index.html" class="brand-logo" style="color:var(--dark-bg);">HUSSEIN <span style="color:var(--primary)">ACADEMY</span></a>

        <div id="welcomeUser" style="font-weight:700; color:#1f2937;"></div>

        <div class="header-actions">

            <span id="daysCounter" style="background:#eff6ff; padding:8px 16px; border-radius:20px; font-size:12px; font-weight:700; color:var(--primary); margin-left:15px;"></span>

            <button onclick="exit()" class="btn btn-primary" style="background:#ef4444; border-color:#ef4444; padding:8px 16px; font-size:13px;">تسجيل خروج</button>

        </div>

    </header>



    <div class="student-layout">

        <div>

            <div class="playlist-selector-box">

                <select id="courseDropdown" onchange="loadVideosOfSelectedCourse()"></select>

            </div>

            <aside class="sidebar-playlist">

                <ul class="v-list" id="videosListView"></ul>

            </aside>

        </div>

        <main class="player-panel">

            <h2 id="videoDisplayTitle" style="font-size:1.4rem; font-weight:700; margin-top:0; margin-bottom:20px;">اختر الدرس</h2>

            <div class="screen-frame" id="playerContainer"></div>

            <div class="download-box" id="attachmentsBox"></div>

        </main>

    </div>



    <script>

        let hlsInstance = null;



        // =========================
        // نظام حماية الجهاز
        // =========================

        function generateDeviceId() {

            let deviceId = localStorage.getItem('academy_device_id');



            if (!deviceId) {

                deviceId = 'DEV-' + Math.random().toString(36).substr(2, 9) + Date.now();

                localStorage.setItem('academy_device_id', deviceId);

            }



            return deviceId;

        }



        // --- نظام الحماية المعدل ---

        function enforceSecurity() {

            const current = JSON.parse(localStorage.getItem('current_user'));

            const allUsers = JSON.parse(localStorage.getItem('academy_users')) || [];



            // تحقق: هل المستخدم مسجل أصلاً في النظام؟

            const userData = allUsers.find(u => u.email === current?.email);



            if (!current || !userData) {

                window.location.href = 'login.html';

                return false;

            }



            // =========================
            // ربط الحساب بجهاز واحد
            // =========================

            const currentDevice = generateDeviceId();



            if (!userData.deviceId) {

                // أول تسجيل دخول

                userData.deviceId = currentDevice;



                const updatedUsers = allUsers.map(u => {

                    if (u.email === userData.email) {

                        return userData;

                    }

                    return u;

                });



                localStorage.setItem('academy_users', JSON.stringify(updatedUsers));

            } else {

                // منع فتح الحساب على جهاز آخر

                if (userData.deviceId !== currentDevice) {

                    document.getElementById('lockCurtain').style.display = 'flex';

                    document.getElementById('lockTitle').innerText = 'هذا الحساب يعمل على جهاز آخر';

                    return false;

                }

            }



            // تحقق من الصلاحية

            const diff = new Date(userData.expiryDate) - new Date();

            const days = Math.ceil(diff / (1000 * 60 * 60 * 24));



            if (userData.status !== 'active' || days <= 0) {

                document.getElementById('lockCurtain').style.display = 'flex';

                return false;

            }



            document.getElementById('welcomeUser').innerText = `مرحباً: ${userData.name}`;

            document.getElementById('daysCounter').innerText = `متبقي: ${days} يوم`;



            return true;

        }



        // تنفيذ فوري

        if(enforceSecurity()) {

            loadCoursesDropdown();

        }



        function loadCoursesDropdown() {

            const courses = JSON.parse(localStorage.getItem('academy_playlists')) || [];

            const dropdown = document.getElementById('courseDropdown');



            dropdown.innerHTML = courses.map(c => `<option value="${c}">${c}</option>`).join('');



            loadVideosOfSelectedCourse();

        }



        function loadVideosOfSelectedCourse() {

            const selectedCourse = document.getElementById('courseDropdown').value;

            const allVideos = JSON.parse(localStorage.getItem('academy_playlist_videos')) || [];



            const filtered = allVideos.filter(v => v.course === selectedCourse);



            const list = document.getElementById('videosListView');



            list.innerHTML = filtered.map((v, i) =>

                `<li class="v-item ${i===0?'active':''}" onclick='triggerStream(${JSON.stringify(v)}, this)'>

                    ${v.title}

                </li>`

            ).join('');



            if(filtered.length > 0) {

                triggerStream(filtered[0], document.querySelector('.v-item'));

            }

        }



        window.triggerStream = function(videoJson, element) {



            document.querySelectorAll('.v-item').forEach(item => {

                item.classList.remove('active');

            });



            if(element) {

                element.classList.add('active');

            }



            const v = typeof videoJson === 'string'

                ? JSON.parse(videoJson)

                : videoJson;



            // تحديث الواجهة

            document.getElementById('videoDisplayTitle').innerText = v.title;



            document.getElementById('attachmentsBox').innerHTML =

                v.link

                ? `<a href="${v.link}" target="_blank" class="dl-btn">تحميل الملحق</a>`

                : '';



            // تشغيل الفيديو

            const container = document.getElementById('playerContainer');



            if (hlsInstance) {

                hlsInstance.destroy();

            }



            // يوتيوب

            if (v.src.includes('youtu')) {



                let youtubeId = '';



                if (v.src.includes('watch?v=')) {

                    youtubeId = v.src.split('watch?v=')[1].split('&')[0];

                } else {

                    youtubeId = v.src.split('/').pop();

                }



                container.innerHTML = `

                    <iframe

                        class="html5-video"

                        src="https://www.youtube.com/embed/${youtubeId}"

                        frameborder="0"

                        allowfullscreen>

                    </iframe>

                `;



            }

            // m3u8

            else if (v.src.includes('.m3u8')) {



                container.innerHTML = `

                    <video

                        id="hlsPlayer"

                        class="html5-video"

                        controls

                        playsinline>

                    </video>

                `;



                const video = document.getElementById('hlsPlayer');



                if (Hls.isSupported()) {



                    hlsInstance = new Hls();

                    hlsInstance.loadSource(v.src);

                    hlsInstance.attachMedia(video);



                    hlsInstance.on(Hls.Events.MANIFEST_PARSED, function () {

                        video.play();

                    });



                } else if (video.canPlayType('application/vnd.apple.mpegurl')) {



                    video.src = v.src;

                    video.addEventListener('loadedmetadata', function () {

                        video.play();

                    });

                }



            }

            // mp4

            else {



                container.innerHTML = `

                    <video

                        class="html5-video"

                        controls

                        playsinline

                        controlsList="nodownload"

                        oncontextmenu="return false;">

                        <source src="${v.src}" type="video/mp4">

                    </video>

                `;

            }

        }



        function exit() {

            localStorage.removeItem('current_user');

            window.location.href = 'login.html';

        }



        // منع كليك يمين

        document.addEventListener('contextmenu', e => e.preventDefault());



        // منع فتح أدوات المطور البسيطة

        document.addEventListener('keydown', function(e) {

            if (

                e.key === 'F12' ||

                (e.ctrlKey && e.shiftKey && e.key === 'I') ||

                (e.ctrlKey && e.shiftKey && e.key === 'J') ||

                (e.ctrlKey && e.key === 'U')

            ) {

                e.preventDefault();

            }

        });

    </script>

</body>

</html>
